name: Deploy Frontend to DigitalOcean

# This is a TEMPLATE - Replace placeholders before using:
# 20 - 20 for MFEs, 22 for shell/sso
# so360-people-connect/so360-people-connect-fe - e.g., so360-crm/so360-crm-fe
# people - e.g., crm, shell, login, etc.
# [SPECIAL_BUILD_STEPS] - Optional: Add for shell shared packages build

on:
  push:
    branches:
      - develop  # Dev environment
      - qa       # Staging environment

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Cancel Previous Runs
      uses: styfle/cancel-workflow-action@0.11.0
      with:
        access_token: ${{ secrets.PAT_TOKEN }}

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    # [SPECIAL_BUILD_STEPS] - Uncomment for shell-fe only
    # - name: Build shared packages (Shell only)
    #   run: |
    #     cd packages/shell-context && npm run build
    #     cd ../design-system && npm run build
    #     cd ../event-bus && npm run build
    #     cd ../..

    - name: Build application
      run: npm run build

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}

    # ========== DEV ENVIRONMENT (develop branch) ==========
    - name: Deploy to Dev Environment
      if: github.ref == 'refs/heads/develop'
      env:
        DOMAIN: dev.people.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-people-connect/so360-people-connect-fe
        NGINX_ROOT: /var/www/dev.people.skyoffice360.com/html
        SERVER: ${{ secrets.DEV_NGINX_VM }}
      run: |
        echo "🚀 Deploying to Dev: $DOMAIN"

        # Add server to known hosts
        ssh-keyscan $SERVER >> ~/.ssh/known_hosts

        # Create build directory on server
        ssh root@$SERVER "mkdir -p $BUILD_DIR"

        # Copy source to build directory (excluding node_modules and dist)
        rsync -avz --delete \
          --exclude 'node_modules' \
          --exclude 'dist' \
          --exclude '.git' \
          ./ root@$SERVER:$BUILD_DIR/

        # Execute deployment script on server
        ssh root@$SERVER "bash -s" << 'DEPLOY_SCRIPT'
          set -e

          # Environment variables
          export DOMAIN="$DOMAIN"
          export BUILD_DIR="$BUILD_DIR"
          export NGINX_ROOT="$NGINX_ROOT"

          echo "📍 Build directory: $BUILD_DIR"
          echo "📍 Deploy to: $NGINX_ROOT"

          # Navigate to build directory
          cd "$BUILD_DIR"

          # Load NVM
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22 || nvm use 20

          # Install dependencies and build
          echo "📦 Installing dependencies..."
          npm ci --production=false

          echo "🔨 Building application..."
          npm run build

          # Configure NGINX if not already configured
          if [ ! -f "/etc/nginx/sites-available/$DOMAIN" ]; then
            echo "🔧 Configuring NGINX for $DOMAIN..."
            bash /github/configure-nginx.sh "$DOMAIN" "$NGINX_ROOT" "dev"
          else
            echo "✅ NGINX already configured for $DOMAIN"
          fi

          # Deploy built files to NGINX root
          echo "📦 Deploying files to $NGINX_ROOT..."
          mkdir -p "$NGINX_ROOT"
          rm -rf "${NGINX_ROOT:?}"/*
          cp -r dist/* "$NGINX_ROOT/"

          echo "✅ Deployed to https://$DOMAIN"
        DEPLOY_SCRIPT

    # ========== STAGING ENVIRONMENT (qa branch) ==========
    - name: Deploy to Staging Environment
      if: github.ref == 'refs/heads/qa'
      env:
        DOMAIN: staging.people.skyoffice360.com
        BUILD_DIR: /github/SO360 V.2/so360-people-connect/so360-people-connect-fe
        NGINX_ROOT: /var/www/staging.people.skyoffice360.com/html
        SERVER: ${{ secrets.STAGING_NGINX_VM }}
      run: |
        echo "🚀 Deploying to Staging: $DOMAIN"

        # Add server to known hosts
        ssh-keyscan $SERVER >> ~/.ssh/known_hosts

        # Create build directory on server
        ssh root@$SERVER "mkdir -p $BUILD_DIR"

        # Copy source to build directory
        rsync -avz --delete \
          --exclude 'node_modules' \
          --exclude 'dist' \
          --exclude '.git' \
          ./ root@$SERVER:$BUILD_DIR/

        # Execute deployment script on server
        ssh root@$SERVER "bash -s" << 'DEPLOY_SCRIPT'
          set -e

          # Environment variables
          export DOMAIN="$DOMAIN"
          export BUILD_DIR="$BUILD_DIR"
          export NGINX_ROOT="$NGINX_ROOT"

          echo "📍 Build directory: $BUILD_DIR"
          echo "📍 Deploy to: $NGINX_ROOT"

          # Navigate to build directory
          cd "$BUILD_DIR"

          # Load NVM
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
          nvm use 22 || nvm use 20

          # Install dependencies and build
          echo "📦 Installing dependencies..."
          npm ci --production=false

          echo "🔨 Building application..."
          npm run build

          # Configure NGINX if not already configured
          if [ ! -f "/etc/nginx/sites-available/$DOMAIN" ]; then
            echo "🔧 Configuring NGINX for $DOMAIN..."
            bash /github/configure-nginx.sh "$DOMAIN" "$NGINX_ROOT" "staging"
          else
            echo "✅ NGINX already configured for $DOMAIN"
          fi

          # Deploy built files to NGINX root
          echo "📦 Deploying files to $NGINX_ROOT..."
          mkdir -p "$NGINX_ROOT"
          rm -rf "${NGINX_ROOT:?}"/*
          cp -r dist/* "$NGINX_ROOT/"

          echo "✅ Deployed to https://$DOMAIN"
        DEPLOY_SCRIPT

    - name: Deployment Summary
      if: always()
      run: |
        echo ""
        echo "========================================="
        echo "Deployment Complete"
        echo "========================================="
        if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
          echo "Environment: Development"
          echo "URL: https://dev.people.skyoffice360.com"
        elif [ "${{ github.ref }}" == "refs/heads/qa" ]; then
          echo "Environment: Staging"
          echo "URL: https://staging.people.skyoffice360.com"
        fi
        echo "========================================="
